<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Cards</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
        <script type="module" src="cartas.js" defer></script>
    </head>
    <body>
        <canvas id="pokeCanvas"></canvas>
        <nav class="navbar">
            <div>
                <a id="home" href="/"><img src="imagens/Home.png" alt="Home"></a>
                <a class="navbar-items" href="/Cards"><img src="imagens/Cartas.png" alt="Cartas.png"></a>
                <a class="navbar-items" href="/Tournaments"><img src="imagens/Torneios.png" alt="Torneios.png"></a>
            </div>   
            
           <div class="searchbar-container">
            <input class="searchbar" type="text" id="searchBar" placeholder="Pesquisar carta...">
            <ul id="searchResults" class="search-results"></ul>
            </div>
            
             <div class="settings-container">
                <img src="imagens/Definições.png" alt="Definições" class="settings-icon" onclick="toggleSettingsMenu()">
                <div class="settings-menu hidden" id="settingsMenu">
                    <a href="/Settings">Definições</a>
                    <a href="#">Temas</a>
                     <a href="/Notificacoes">Notificações</a>
                   
                </div>
            </div>
            <div class="profile-container">
                <img src="imagens/Perfil.png" alt="Perfil" class="profile-icon" onclick="toggleProfileMenu()">
                <div class="profile-menu hidden" id="profileMenu">
                    <!-- Cabeçalho -->
                    <div class="profile-header">
                        <img src="imagens/avatar.png" class="profile-avatar">
                        <div class="profile-username">@username</div>
                        <div class="profile-name">Name</div>
                    </div>
                    
                    <!-- Divisor -->
                    
                    
                    <!-- Itens do Menu -->
                    <a href="/Tournaments">Torneios Realizados</a>
                    <a href="/Cards">Cartas Expostas</a>
                    <a href="/Binders">Binders em Exposição</a>
                    <a href="/Binders">Cartas Favoritas</a>
                    <a href="#logout" class="logout-btn">Logout</a>
                </div>
            </div>
        </nav>

        <div class="displaycard cards Hot">
            <p class="pl">Hot Cards</p>
           
        </div>

        <div class="displaycard cards">
            <p>Recently Added Cards</p>
           
        </div>

        <div class="displaycard profile">
            <p>Suggested Sellers</p>
        
            <img src="/imagens/PsyduckTrainer.png" alt="Seller">
            <img src="/imagens/DragoniteTrainer.png" alt="Seller">
            <img src="/imagens/CharizardTrainer.png" alt="Seller">
        </div>
        

        <script type="module" src="/firebase.js"></script>
        <script type="module" src="auth.js"></script>
        <script type="module" src="searchbar.js"></script>
    </body>
</html>
